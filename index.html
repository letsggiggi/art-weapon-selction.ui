<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ART WEAPON SELECT</title>

<style>

@font-face{
font-family:'NeoDGM';
src:url('neodgm.ttf');
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'NeoDGM';
}

:root{
--purple:#8c52ff;
--purple2:#b388ff;
--gold:#e7c56f;
--panel:rgba(12,12,20,.78);
}

body{

min-height:100dvh;

background:
linear-gradient(
rgba(0,0,0,.55),
rgba(0,0,0,.78)
),
url("background.gif");

background-size:cover;
background-position:center;

color:white;

overflow:hidden;
}

/* CRT */

body::after{

content:"";

position:fixed;
inset:0;

background:
repeating-linear-gradient(
0deg,
rgba(255,255,255,.03),
rgba(255,255,255,.03) 1px,
transparent 1px,
transparent 3px
);

pointer-events:none;
}

/* START SCREEN */

#startScreen{

position:absolute;
inset:0;

display:flex;
flex-direction:column;

justify-content:center;
align-items:center;

padding:30px;

z-index:10;
}

.title{

font-size:2rem;

text-align:center;

color:var(--gold);

text-shadow:
0 0 10px var(--gold),
0 0 25px var(--gold);

margin-bottom:15px;
}

.mission{

opacity:.85;

margin-bottom:50px;

text-align:center;
}

.press{

font-size:1.2rem;

cursor:pointer;

animation:blink 1s infinite;
}

@keyframes blink{

50%{
opacity:.25;
}

}

/* GAME SCREEN */

#gameScreen{

display:none;

height:100dvh;

overflow:auto;

padding-bottom:40px;
}

.container{

padding:18px;
}

.weaponBtn{

width:100%;

min-height:60px;

border:none;

background:var(--panel);

border:2px solid var(--purple);

border-radius:12px;

color:white;

font-size:1rem;

margin-bottom:10px;

transition:.2s;
}

.weaponBtn.active{

transform:scale(1.03);

box-shadow:
0 0 10px var(--purple),
0 0 25px var(--purple);
}

/* IMAGE */

.weaponImage{

display:block;

margin:20px auto;

width:100%;

max-width:320px;

height:320px;

object-fit:contain;

filter:
drop-shadow(0 0 15px var(--purple))
drop-shadow(0 0 30px var(--purple));

animation:fadeIn .35s;
}

@keyframes fadeIn{

from{
opacity:0;
transform:scale(.9);
}

to{
opacity:1;
transform:scale(1);
}

}

/* INFO */

.weaponName{

font-size:1.3rem;

color:var(--gold);

margin-bottom:10px;
}

.weaponType{

opacity:.8;

margin-bottom:20px;
}

/* STATS */

.stat{

margin-bottom:14px;
}

.bar{

height:16px;

background:#111;

border:1px solid #444;

margin-top:4px;
}

.fill{

width:0%;

height:100%;

transition:.5s;

background:
linear-gradient(
90deg,
var(--purple),
var(--purple2)
);
}

.sectionTitle{

margin-top:20px;
margin-bottom:8px;

color:var(--gold);
}

.skill{

color:#ffb4b4;

line-height:1.7;
}

.lore{

line-height:1.8;

padding-bottom:60px;
}

.footer{

text-align:center;

opacity:.5;

margin-top:25px;

font-size:.8rem;
}

</style>
</head>

<body>

<audio id="cursorSfx" src="cursor.wav"></audio>
<audio id="selectSfx" src="select.wav"></audio>

<!-- START -->

<div id="startScreen">

<div class="title">
ART WEAPON SELECT
</div>

<div class="mission">
MISSION : 전국 미술계 제패
</div>

<div class="press" onclick="startGame()">
PRESS START
</div>

</div>

<!-- GAME -->

<div id="gameScreen">

<div class="container">

<button class="weaponBtn active"
onclick="selectWeapon(0,this)">
진지 : 묵중한 결계
</button>

<button class="weaponBtn"
onclick="selectWeapon(1,this)">
대구경 화구포 : 무한의 화폭
</button>

<button class="weaponBtn"
onclick="selectWeapon(2,this)">
비붓 : 키사라기 단도
</button>

<button class="weaponBtn"
onclick="selectWeapon(3,this)">
흑연의 비뢰 : 글루 개틀링
</button>

<img
id="weaponImage"
class="weaponImage"
src="jinji.png">

<div
id="weaponName"
class="weaponName">
</div>

<div
id="weaponType"
class="weaponType">
</div>

<div class="stat">
ATK
<div class="bar">
<div id="atk" class="fill"></div>
</div>
</div>

<div class="stat">
DEF
<div class="bar">
<div id="def" class="fill"></div>
</div>
</div>

<div class="stat">
SPD
<div class="bar">
<div id="spd" class="fill"></div>
</div>
</div>

<div class="stat">
ART
<div class="bar">
<div id="art" class="fill"></div>
</div>
</div>

<div class="sectionTitle">
SKILL
</div>

<div
id="weaponSkill"
class="skill">
</div>

<div class="sectionTitle">
LORE
</div>

<div
id="weaponLore"
class="lore">
</div>

<div class="footer">

ART WEAPON DATABASE

<br><br>

PLAYER : HYEIN

<br>

CLASS : ART WARRIOR

<br>

Created by Hyein

</div>
</div>

<script>

const weapons=[

{
img:"jinji.png",
name:"진지 : 묵중한 결계(鎮紙 : Heavy Barrier)",
type:"Heavy Blunt Weapon",

atk:80,
def:60,
spd:40,
art:90,

skill:"화선압정",

lore:"거대하고 정밀한 나무 문진 두 개를 단단한 사슬로 엮어 만든 쌍절곤. 본래 화선지가 바람에 날리지 않도록 묵직하게 눌러주는 용도였던 만큼, 이 무기에 맞은 적은 압도적인 중압감을 느끼게 된다. 가벼운 휘두름 한 번으로도 적의 뼈를 분쇄할 정도의 파괴력을 자랑하지만, 무게 탓에 빠른 연타는 어렵다."
},

{
img:"bazooka.png",
name:"대구경 화구포 : 무한의 화폭(Infinite Canvas)",
type:"Heavy Artillery Weapon",

atk:100,
def:30,
spd:20,
art:70,

skill:"백지화",

lore:"화구통을 개조한 휴대용 로켓포. 단 한 발로 전장을 피와 물감의 아수라장으로 만들 수 있는 파괴력을 지녔지만, 재장전 시간이 길고 반동이 무지막지 하다는 단점이 있다. 전방을 향해 초대형 먹물 폭발탄을 발사하여 광범위한 폭발 피해를 입힌다. 폭발 범위 내에 있던 적들의 모든 버프 효과를 지워버리고 시야를 차단한다."
},

{
img:"kisaragi.png",
name:"비붓 : 키사라기 단도(Secret Brush : Kisaragi)",
type:"Assassin Chain-Dagger",

atk:70,
def:20,
spd:100,
art:80,

skill:"묵영참",

lore:"붓 두 자루를 사슬로 연결한 암살 무기. 붓털처럼 보이는 끝부분은 강철도 종이처럼 찢는 흑요석 칼날로 변한다. 사슬을 이용해 중거리에서 변칙적인 궤도로 적을 자르고 찌르는 스피드 오리엔탈 형태의 무기다. 그림자처럼 움직이며 적을 순식간에 베어낸다."
},

{
img:"gatling.png",
name:"흑연의 비뢰 : 글루 개틀링(Graphite Volley)",
type:"Multi-Barrel Pencil Gun",

atk:90,
def:40,
spd:80,
art:60,

skill:"디스토피아",

lore:"수백 자루의 연필을 결속한 다연장 화기. 글루건 방아쇠를 당기면 내부의 열 코어가 활성화 되면서 연필심(흑연) 파편을 초고속으로 연속 사출한다. 무수한 연필 촉이 칼날처럼 박히는 동시에 녹아내린 뜨거운 글루건 액이 적을 덮쳐 행동을 제약하는 위력이 있다."
}

];

/* 시작 */

function startGame(){

const selectSound=
document.getElementById("selectSfx");

selectSound.currentTime=0;
selectSound.play();

document.getElementById("startScreen")
.style.display="none";

document.getElementById("gameScreen")
.style.display="block";

loadWeapon(0);

}

/* 버튼 클릭 */

function selectWeapon(index,button){

const cursor=
document.getElementById("cursorSfx");

cursor.currentTime=0;
cursor.play();

document
.querySelectorAll(".weaponBtn")
.forEach(btn=>{
btn.classList.remove("active");
});

button.classList.add("active");

loadWeapon(index);

}

/* 데이터 표시 */

function loadWeapon(index){

const w=weapons[index];

document.getElementById("weaponImage").src=w.img;

document.getElementById("weaponName").innerText=w.name;

document.getElementById("weaponType").innerText=w.type;

document.getElementById("weaponSkill").innerText=w.skill;

document.getElementById("weaponLore").innerText=w.lore;

/* 스탯 애니메이션 */

setTimeout(()=>{
document.getElementById("atk").style.width=
w.atk+"%";

document.getElementById("def").style.width=
w.def+"%";

document.getElementById("spd").style.width=
w.spd+"%";

document.getElementById("art").style.width=
w.art+"%";
},100);

}

/* 모바일 최초 진입시 */

loadWeapon(0);

</script>

</body>
</html>
